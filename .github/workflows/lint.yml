name: Lint shell scripts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax:
    name: Syntax check (bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on every script
        run: |
          set -e
          for f in setup.sh check-setup.sh scripts/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done
          echo "Checking install.sh (POSIX sh)"
          sh -n install.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck (errors only)
        uses: ludeeus/action-shellcheck@master
        with:
          # Fail only on genuine errors, not style/info warnings, so the
          # existing scripts pass while still catching real bugs (undefined
          # functions, `local` outside a function, bad redirections, etc.).
          severity: error
          additional_files: 'setup.sh check-setup.sh install.sh'
          scandir: './scripts'
