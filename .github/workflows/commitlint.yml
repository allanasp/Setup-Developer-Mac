name: Commitlint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the action can lint the range of pushed commits.
          fetch-depth: 0
      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v6
